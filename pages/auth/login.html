<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantixAi | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/login-style.css">
</head>
<body class="login-body">
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="login-container glass-panel">
        <div class="login-header">
            <div class="logo">Quantix<span class="gradient-text">Ai</span></div>
            <p class="text-muted">Enter the Neural Grid</p>
        </div>

        <div class="role-toggle">
            <button id="btn-student" class="toggle-btn active" onclick="setRole('student')">Student</button>
            <button id="btn-teacher" class="toggle-btn" onclick="setRole('teacher')">Instructor</button>
        </div>

        <form id="login-form" class="login-form">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="agent@quantix.ai" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <div class="form-options">
                <label><input type="checkbox" id="remember-me"> Remember me</label>
                <a href="#" id="forgot-password" class="text-cyan">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-primary login-btn">Initialize Session</button>
        </form>
        
        <p class="signup-link text-muted">New to the grid? <a href="#" class="text-purple">Request Access</a></p>
    </div>

    <script type="module" src="../../js/auth/login.js"></script>
</body>
</html>
